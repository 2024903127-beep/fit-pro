<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — FitPro</title>
<link rel="stylesheet" href="../assets/css/main.css">
<style>
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-primary)}
.auth-bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.auth-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.25}
.orb-a{width:500px;height:500px;background:radial-gradient(circle,#ff6b35,transparent);top:-100px;right:-100px}
.orb-b{width:400px;height:400px;background:radial-gradient(circle,#4f9fff,transparent);bottom:-100px;left:-100px}
.auth-wrap{position:relative;z-index:1;width:100%;max-width:460px;padding:20px}
.auth-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-xl);padding:40px;animation:fadeUp 0.5s ease both}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo a{font-family:var(--font-display);font-size:1.5rem;font-weight:700;text-decoration:none;color:var(--text-primary);display:inline-flex;align-items:center;gap:8px}
.role-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:28px}
.role-option{padding:12px 8px;border-radius:var(--radius-md);border:1px solid var(--border);cursor:pointer;text-align:center;transition:var(--transition);background:transparent}
.role-option.selected{border-color:var(--accent-1);background:rgba(255,107,53,0.08)}
.role-option input{display:none}
.role-option-icon{font-size:1.5rem;margin-bottom:4px}
.role-option-label{font-size:0.75rem;font-weight:600;color:var(--text-secondary)}
.role-option.selected .role-option-label{color:var(--accent-1)}
.auth-title{font-family:var(--font-display);font-size:1.6rem;font-weight:700;margin-bottom:6px;text-align:center}
.auth-sub{font-size:0.85rem;color:var(--text-secondary);margin-bottom:28px;text-align:center}
.auth-form{display:flex;flex-direction:column;gap:16px}
.otp-inputs{display:flex;gap:10px;justify-content:center}
.otp-input{width:52px;height:56px;text-align:center;font-size:1.3rem;font-weight:700;background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);outline:none;font-family:var(--font-display);transition:var(--transition)}
.otp-input:focus{border-color:var(--accent-1);box-shadow:0 0 0 3px rgba(255,107,53,0.12)}
.otp-timer{text-align:center;font-size:0.82rem;color:var(--text-muted);margin-top:8px}
.otp-timer a{color:var(--accent-1);cursor:pointer;text-decoration:none}
.divider-text{text-align:center;color:var(--text-muted);font-size:0.8rem;position:relative;margin:4px 0}
.divider-text::before,.divider-text::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border)}
.divider-text::before{left:0} .divider-text::after{right:0}
.social-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-glass);cursor:pointer;font-size:0.88rem;font-weight:600;color:var(--text-primary);transition:var(--transition);text-decoration:none}
.social-btn:hover{border-color:var(--border-active);background:var(--bg-card)}
.auth-switch{text-align:center;font-size:0.85rem;color:var(--text-muted);margin-top:16px}
.auth-switch a{color:var(--accent-1);text-decoration:none;font-weight:600}
.step{display:none} .step.active{display:flex;flex-direction:column;gap:16px}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--text-muted);font-size:0.82rem;cursor:pointer;background:none;border:none;font-family:var(--font-body);transition:var(--transition)}
.back-btn:hover{color:var(--text-primary)}
</style>
</head>
<body>
<div class="auth-bg"><div class="auth-orb orb-a"></div><div class="auth-orb orb-b"></div></div>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><a href="../index.html">💪 FitPro</a></div>

    <!-- ROLE SELECTOR -->
    <div class="role-selector">
      <label class="role-option selected" id="role-trainer">
        <input type="radio" name="role" value="trainer">
        <div class="role-option-icon">🏋️</div>
        <div class="role-option-label">Trainer</div>
      </label>
      <label class="role-option" id="role-learner">
        <input type="radio" name="role" value="learner">
        <div class="role-option-icon">🎯</div>
        <div class="role-option-label">Learner</div>
      </label>
      <label class="role-option" id="role-admin">
        <input type="radio" name="role" value="admin">
        <div class="role-option-icon">👑</div>
        <div class="role-option-label">Admin</div>
      </label>
    </div>

    <!-- STEP 1: EMAIL -->
    <div class="step active" id="step-email">
      <div>
        <div class="auth-title">Welcome Back</div>
        <div class="auth-sub">Enter your email to receive a login OTP</div>
      </div>
      <div class="input-group">
        <label>Email Address</label>
        <input class="input" type="email" id="email-input" placeholder="you@example.com">
      </div>
      <button class="btn btn-primary" onclick="sendOTP()" id="send-otp-btn" style="width:100%">
        Send OTP →
      </button>
      <div class="divider-text">or</div>
      <a class="social-btn" onclick="googleLogin()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </a>
      <div class="auth-switch">Don't have an account? <a href="register.html">Register here</a></div>
    </div>

    <!-- STEP 2: OTP -->
    <div class="step" id="step-otp">
      <button class="back-btn" onclick="goBack('step-email')">← Back</button>
      <div>
        <div class="auth-title">Check Your Email</div>
        <div class="auth-sub" id="otp-sub">We sent a 6-digit OTP to your email</div>
      </div>
      <div>
        <div class="otp-inputs">
          <input class="otp-input" maxlength="1" id="otp0" oninput="otpMove(0)">
          <input class="otp-input" maxlength="1" id="otp1" oninput="otpMove(1)">
          <input class="otp-input" maxlength="1" id="otp2" oninput="otpMove(2)">
          <input class="otp-input" maxlength="1" id="otp3" oninput="otpMove(3)">
          <input class="otp-input" maxlength="1" id="otp4" oninput="otpMove(4)">
          <input class="otp-input" maxlength="1" id="otp5" oninput="otpMove(5)">
        </div>
        <div class="otp-timer">Resend OTP in <span id="timer">30</span>s · <a onclick="resendOTP()">Resend</a></div>
      </div>
      <button class="btn btn-primary" onclick="verifyOTP()" style="width:100%">Verify & Login →</button>
    </div>
  </div>
</div>

<script src="../assets/js/app.js"></script>
<script>
let selectedRole = 'trainer';
let timerInterval;

// Pre-select role from URL
const urlRole = new URLSearchParams(location.search).get('role');
if (urlRole) selectRole(urlRole);

document.querySelectorAll('.role-option').forEach(opt => {
  opt.addEventListener('click', () => {
    const role = opt.querySelector('input').value;
    selectRole(role);
  });
});

function selectRole(role) {
  selectedRole = role;
  document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
  document.getElementById('role-' + role)?.classList.add('selected');
}

function sendOTP() {
  const email = document.getElementById('email-input').value;
  if (!email || !email.includes('@')) { Toast.show('Please enter a valid email', 'error'); return; }
  document.getElementById('otp-sub').textContent = `OTP sent to ${email}`;
  document.getElementById('step-email').classList.remove('active');
  document.getElementById('step-otp').classList.add('active');
  Toast.show('OTP sent! Use 123456 for demo', 'success');
  startTimer(30);
}

function startTimer(seconds) {
  clearInterval(timerInterval);
  document.getElementById('timer').textContent = seconds;
  timerInterval = setInterval(() => {
    seconds--;
    document.getElementById('timer').textContent = seconds;
    if (seconds <= 0) clearInterval(timerInterval);
  }, 1000);
}

function otpMove(index) {
  const val = document.getElementById('otp' + index).value;
  if (val && index < 5) document.getElementById('otp' + (index+1)).focus();
  // Auto verify
  const otp = Array.from({length:6}, (_,i) => document.getElementById('otp'+i).value).join('');
  if (otp.length === 6) verifyOTP();
}

function verifyOTP() {
  const otp = Array.from({length:6}, (_,i) => document.getElementById('otp'+i).value).join('');
  if (otp.length < 6) { Toast.show('Enter all 6 digits', 'error'); return; }
  // Demo: any OTP works
  Toast.show('Login successful! Redirecting...', 'success');
  setTimeout(() => {
    if (selectedRole === 'trainer') window.location = 'trainer-dashboard.html';
    else if (selectedRole === 'admin') window.location = 'admin-dashboard.html';
    else window.location = 'learner-dashboard.html';
  }, 1000);
}

function resendOTP() { Toast.show('OTP resent!', 'info'); startTimer(30); }
function goBack(step) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(step).classList.add('active');
}
function googleLogin() {
  Toast.show('Google OAuth — configure in Supabase', 'info');
  setTimeout(() => window.location = selectedRole === 'trainer' ? 'trainer-dashboard.html' : selectedRole === 'admin' ? 'admin-dashboard.html' : 'learner-dashboard.html', 1500);
}

// Keyboard nav for OTP
document.addEventListener('keydown', (e) => {
  if (e.target.classList.contains('otp-input')) {
    const idx = parseInt(e.target.id.replace('otp',''));
    if (e.key === 'Backspace' && !e.target.value && idx > 0) document.getElementById('otp'+(idx-1)).focus();
  }
});
</script>
</body>
</html>
